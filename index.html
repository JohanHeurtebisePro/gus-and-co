<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="logocoeur.png">
    <link rel="apple-touch-icon" href="logocoeur.png">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="description" content="Gus&Co — Shine like a star, live with your HEART.">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Gus&Co">
    <meta property="og:image" content="og-cover.jpg">
    <meta property="og:url" content="https://gus-and-co.com">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="og-cover.jpg">
    <meta property="og:title" content="Gus&Co | Vision Indépendante">
    <meta property="og:description" content="Shine like a star, live with your HEART.">
    <meta name="twitter:title" content="Gus&Co | Vision Indépendante">
    <meta name="twitter:description" content="Shine like a star, live with your HEART.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://gus-and-co.com/">
    <title>Gus&Co | Vision Indépendante</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #111111;
            --text-main: #e8e0d0;
            --text-muted: rgba(232, 224, 208, 0.45);
            --border: rgba(232, 224, 208, 0.1);
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
        }

        /* Ink blobs */
        .ink-wrapper {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .ink-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.06;
        }
        .b1 { width: 700px; height: 700px; background: #e8e0d0; top: -200px; left: -200px; }
        .b2 { width: 500px; height: 500px; background: #c8b89a; bottom: -100px; right: -100px; }
        .b3 { width: 400px; height: 400px; background: #e8e0d0; top: 40%; left: 50%; transform: translate(-50%, -50%); }

        /* Layout */
        .coming-soon {
            position: relative;
            z-index: 1;
            height: 100svh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .cs-logo {
            height: 52px;
            width: auto;
            margin-bottom: 4rem;
            opacity: 0;
            animation: fadeUp 0.9s cubic-bezier(0.25, 1, 0.5, 1) 0.3s forwards;
        }

        .cs-label {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: var(--text-muted);
            margin-bottom: 1.8rem;
            opacity: 0;
            animation: fadeUp 0.9s cubic-bezier(0.25, 1, 0.5, 1) 0.5s forwards;
        }

        .cs-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.8rem, 8vw, 6rem);
            font-weight: 400;
            line-height: 1.1;
            color: var(--text-main);
            margin-bottom: 1.5rem;
            opacity: 0;
            animation: fadeUp 0.9s cubic-bezier(0.25, 1, 0.5, 1) 0.65s forwards;
        }
        .cs-title em {
            font-style: italic;
            color: rgba(232, 224, 208, 0.55);
        }

        .cs-time-wrap {
            display: flex;
            align-items: center;
            gap: 1.4rem;
            margin-bottom: 3.5rem;
            opacity: 0;
            animation: fadeUp 0.9s cubic-bezier(0.25, 1, 0.5, 1) 0.8s forwards;
        }
        .cs-line {
            width: 40px;
            height: 1px;
            background: var(--border);
        }
        .cs-time {
            font-family: 'Playfair Display', serif;
            font-size: clamp(3.5rem, 12vw, 8rem);
            font-weight: 600;
            letter-spacing: -2px;
            line-height: 1;
        }

        .cs-countdown {
            display: flex;
            align-items: flex-start;
            gap: 2rem;
            margin-bottom: 3.5rem;
            opacity: 0;
            animation: fadeUp 0.9s cubic-bezier(0.25, 1, 0.5, 1) 0.95s forwards;
        }
        .cd-block { text-align: center; }
        .cd-num {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(1.6rem, 4vw, 2.2rem);
            font-weight: 300;
            display: block;
            min-width: 2.5ch;
            line-height: 1;
            margin-bottom: 0.5rem;
        }
        .cd-label {
            font-size: 0.62rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
        }
        .cd-sep {
            font-size: clamp(1.6rem, 4vw, 2.2rem);
            font-weight: 300;
            color: var(--border);
            line-height: 1;
            animation: blink 1s step-end infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .cs-sub {
            font-size: 0.78rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2.5px;
            opacity: 0;
            animation: fadeUp 0.9s cubic-bezier(0.25, 1, 0.5, 1) 1.1s forwards;
        }
        .cs-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-main);
            margin-right: 8px;
            vertical-align: middle;
            animation: pulse-dot 2s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.3; transform: scale(0.6); }
        }

        .cs-footer {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            opacity: 0;
            animation: fadeUp 0.9s cubic-bezier(0.25, 1, 0.5, 1) 1.3s forwards;
        }
        .cs-footer a {
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.3s;
        }
        .cs-footer a:hover { color: var(--text-main); }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .cs-logo { height: 40px; margin-bottom: 3rem; }
            .cs-countdown { gap: 1.2rem; }
            .cs-time-wrap { gap: 1rem; }
            .cs-line { width: 20px; }
        }
    </style>
</head>
<body>

    <div class="ink-wrapper">
        <div class="ink-blob b1"></div>
        <div class="ink-blob b2"></div>
        <div class="ink-blob b3"></div>
    </div>

    <div class="coming-soon">
        <img src="logo.png" alt="Gus&Co" class="cs-logo">

        <span class="cs-label">Premier Drop — Hiver 2026</span>

        <h1 class="cs-title">Le site ouvre <em>ce soir.</em></h1>

        <div class="cs-time-wrap">
            <span class="cs-line"></span>
            <span class="cs-time">20h00</span>
            <span class="cs-line"></span>
        </div>

        <div class="cs-countdown">
            <div class="cd-block">
                <span class="cd-num" id="cd-h">00</span>
                <span class="cd-label">Heures</span>
            </div>
            <span class="cd-sep">:</span>
            <div class="cd-block">
                <span class="cd-num" id="cd-m">00</span>
                <span class="cd-label">Minutes</span>
            </div>
            <span class="cd-sep">:</span>
            <div class="cd-block">
                <span class="cd-num" id="cd-s">00</span>
                <span class="cd-label">Secondes</span>
            </div>
        </div>

        <p class="cs-sub">
            <span class="cs-dot"></span>
            Le Bonnet — 20.00 €
        </p>
    </div>

    <div class="cs-footer">
        <a href="https://www.instagram.com/gusandcobrand/" target="_blank" rel="noopener noreferrer">Instagram ↗</a>
    </div>

    <script>
        function tick() {
            const now = new Date();
            const target = new Date();
            target.setHours(20, 0, 0, 0);

            let diff = target - now;
            if (diff < 0) diff = 0;

            const h = Math.floor(diff / 1000 / 3600);
            const m = Math.floor((diff / 1000 % 3600) / 60);
            const s = Math.floor(diff / 1000 % 60);

            document.getElementById('cd-h').textContent = String(h).padStart(2, '0');
            document.getElementById('cd-m').textContent = String(m).padStart(2, '0');
            document.getElementById('cd-s').textContent = String(s).padStart(2, '0');
        }
        tick();
        setInterval(tick, 1000);
    </script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ClothingStore",
      "name": "Gus&Co",
      "url": "https://gus-and-co.com",
      "description": "Streetwear indépendant. Shine like a star, live with your heart.",
      "sameAs": ["https://www.instagram.com/gusandcobrand/"]
    }
    </script>
</body>
</html>
